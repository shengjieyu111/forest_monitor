<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}鹫峰林场监测平台{% endblock %}</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>

:root {
  --forest-950:#142b22;
  --forest-900:#19382c;
  --forest-800:#24503f;
  --forest-700:#2d6a52;
  --forest-600:#398466;

  --forest-100:#e9f3ee;
  --forest-50:#f3f8f5;

  --cream:#fbfaf5;
  --canvas:#f3f5f1;
  --card:#fffefb;

  --ink:#1d2c25;
  --muted:#6e7b74;
  --line:#dfe6e1;

  --shadow:0 10px 30px rgba(28,58,46,.07);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    background:var(--canvas);
}

body{
    min-height:100vh;
    background:var(--canvas);
    color:var(--ink);
    font-family:"Microsoft YaHei","PingFang SC",sans-serif;
}

a{
    color:inherit;
    text-decoration:none;
}

ul{
    list-style:none;
}

/* =========================
   总布局
========================= */

.app{
    min-height:100vh;
    display:grid;
    grid-template-columns:208px minmax(0,1fr);
}

/* =========================
   Sidebar
========================= */

.sidebar{

    position:sticky;
    top:0;

    height:100vh;

    padding:22px 14px;

    border-right:1px solid #dce4de;

    background:var(--cream);
}

.brand{

    display:flex;
    align-items:center;
    gap:13px;

    padding:2px 8px 26px;
}

.brand-mark{

    width:48px;
    height:48px;

    display:grid;
    place-items:center;

    color:#fff;

    border-radius:10px;

    background:var(--forest-800);

    box-shadow:0 7px 18px rgba(36,80,63,.2);
}

.brand-mark svg{
    width:24px;
    height:24px;
}

.brand strong{

    display:block;

    color:var(--forest-950);

    font-size:18px;
    font-weight:800;
}

.brand span{

    display:block;

    margin-top:4px;

    color:#87918b;

    font-size:11px;
}

.nav-label{

    padding:18px 11px 9px;

    color:#9aa39e;

    font-size:14px;
    font-weight:700;
}

.nav{

    display:grid;
    gap:4px;
}

.nav-item{

    min-height:52px;

    display:flex;
    align-items:center;
    gap:11px;

    padding:0 12px;

    border-radius:8px;

    color:#68756e;

    transition:.18s;
}

.nav-item:hover{

    background:#f0f4f1;

    color:var(--forest-800);
}

.nav-item.active{

    background:#e3eee8;

    color:var(--forest-900);

    font-weight:700;
}

.nav-item svg{

    width:20px;
    height:20px;
}

/* =========================
   Main
========================= */

.main{
    min-width:0;
}

/* =========================
   Header
========================= */

.page-head{

    display:flex;

    align-items:center;
    justify-content:space-between;

    gap:24px;

    margin-bottom:20px;
}

.eyebrow{

    margin-bottom:7px;

    color:var(--forest-600);

    font-size:12px;
    font-weight:800;
}

.page-head h1{

    margin:0;

    color:var(--forest-950);

    font-size:38px;
    font-weight:800;
}

.user-box{

    padding:10px 16px;

    border-radius:8px;

    background:#e8f4ee;

    color:#2c805e;

    font-size:14px;
    font-weight:700;
}

/* =========================
   内容区域
========================= */

.content{

    width:100%;

    padding:22px 24px 44px;
}

/* 通用卡片 */

.panel{

    border:1px solid var(--line);

    border-radius:14px;

    background:var(--card);

    box-shadow:var(--shadow);
}

.card{

    border:1px solid var(--line);

    border-radius:14px;

    background:var(--card);

    box-shadow:var(--shadow);
}

</style>

{% block css %}
{% endblock %}

</head>

<body>

<div class="app">

```
<aside class="sidebar">

    <div class="brand">

        <div class="brand-mark">
            <i data-lucide="trees"></i>
        </div>

        <div>
            <strong>鹫峰林场监测</strong>
            <span>JIUFENG FOREST</span>
        </div>

    </div>

    <div class="nav-label">
        智能监测
    </div>

    <nav class="nav">

        <a class="nav-item" href="/devices/">
            <i data-lucide="radio-tower"></i>
            <span>设备管理</span>
        </a>

        <a class="nav-item" href="/visitor/">
            <i data-lucide="users-round"></i>
            <span>游客流量</span>
        </a>

        <a class="nav-item" href="/hdfs/">
            <i data-lucide="database"></i>
            <span>HDFS管理</span>
        </a>

        <a class="nav-item" href="/mapreduce/">
            <i data-lucide="bar-chart-3"></i>
            <span>MapReduce分析</span>
        </a>

        <a class="nav-item" href="/ai/">
            <i data-lucide="bot"></i>
            <span>AI识别</span>
        </a>

        <a class="nav-item" href="/users/">
            <i data-lucide="user-round"></i>
            <span>用户管理</span>
        </a>

    </nav>

</aside>

<main class="main">

    <div class="content">

        <section class="page-head">

            <div>

                <div class="eyebrow">
                    BEIJING FORESTRY UNIVERSITY
                </div>

                <h1>
                    {% block page_title %}
                    鹫峰林场监测平台
                    {% endblock %}
                </h1>

            </div>

            <div class="user-box">
                管理员
            </div>

        </section>

        {% block content %}
        {% endblock %}

</main>
```

</div>

<script>
if(window.lucide){
    window.lucide.createIcons();
}
</script>

{% block js %}
{% endblock %}

</body>
</html>
