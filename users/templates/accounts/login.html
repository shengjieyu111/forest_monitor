<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 鹫峰林场监测平台</title>
    <style>
        :root {
            --forest-900: #19382c;
            --forest-700: #2d6a52;
            --forest-100: #e9f3ee;
            --canvas: #f3f5f1;
            --card: #fffefb;
            --line: #dfe6e1;
            --danger: #b42318;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #f3f8f5 0%, #dbece3 100%);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: #1d2c25;
        }

        .card {
            width: min(420px, calc(100vw - 32px));
            padding: 28px;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: var(--card);
            box-shadow: 0 18px 40px rgba(28, 58, 46, 0.12);
        }

        .card h1 {
            margin: 0 0 8px;
            font-size: 28px;
            color: var(--forest-900);
        }

        .card p {
            margin: 0 0 24px;
            color: #587165;
        }

        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .form-control {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd8d1;
            border-radius: 12px;
            font-size: 15px;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--forest-700);
            box-shadow: 0 0 0 4px rgba(45, 106, 82, 0.12);
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            border: 0;
            border-radius: 12px;
            background: var(--forest-700);
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .errorlist, .error {
            margin: 8px 0 0;
            padding: 0;
            list-style: none;
            color: var(--danger);
            font-size: 13px;
        }

        .messages {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 12px;
            background: var(--forest-100);
            color: var(--forest-900);
        }

        .footer {
            margin-top: 16px;
            color: #587165;
            font-size: 14px;
        }

        .footer a {
            color: var(--forest-700);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>用户登录</h1>
        <p>登录后进入主功能页面。</p>

        {% if messages %}
            {% for message in messages %}
                <div class="messages">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <div class="form-group">
                <label for="{{ form.username.id_for_label }}">用户名</label>
                {{ form.username }}
                {{ form.username.errors }}
            </div>

            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">密码</label>
                {{ form.password }}
                {{ form.password.errors }}
            </div>

            {{ form.non_field_errors }}

            <button type="submit" class="btn">登 录</button>
        </form>

        <div class="footer">
            没有账号？<a href="{% url 'user_register' %}">立即注册</a>
        </div>
    </div>
</body>
</html>
